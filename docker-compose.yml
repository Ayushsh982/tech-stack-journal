version: '3.8'

services:
  app1:
    build: ./app1
    ports:
      - "8081:8081"
    volumes:
      - ./app1:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

  app2:
    build: ./app2
    ports:
      - "8082:8082"
    volumes:
      - ./app2:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true