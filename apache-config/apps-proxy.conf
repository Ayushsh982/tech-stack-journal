# Apache Path-Based Proxy — /first and /second
# Place this file at: /etc/apache2/sites-available/apps-proxy.conf
#
# This config serves:
#   http://localhost/first  → App 1
#   http://localhost/second → App 2
#
# Requires: mod_proxy, mod_proxy_http, mod_headers
# Enable with: sudo a2enmod proxy proxy_http headers

<VirtualHost *:80>
    ServerName localhost

    # ── /first → App 1 (port 8081) ──────────────────────
    ProxyPass        /first  http://localhost:8081/
    ProxyPassReverse /first  http://localhost:8081/

    # ── /second → App 2 (port 8082) ─────────────────────
    ProxyPass        /second  http://localhost:8082/
    ProxyPassReverse /second  http://localhost:8082/

    # Fix asset paths when served under a sub-path
    # (React apps must be built with "homepage": "." in package.json)

    # Default root — optional landing page
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/proxy_error.log
    CustomLog ${APACHE_LOG_DIR}/proxy_access.log combined
</VirtualHost>
