# Apache Virtual Host — App 1 on port 8081
# Place this file at: /etc/apache2/sites-available/app1-8081.conf

<VirtualHost *:8081>
    ServerName localhost
    DocumentRoot /var/www/app1

    <Directory /var/www/app1>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # React Router support — redirect all requests to index.html
        FallbackResource /index.html
    </Directory>

    # Cache static assets aggressively
    <FilesMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "max-age=31536000, public"
    </FilesMatch>

    # Never cache index.html
    <FilesMatch "index\.html$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Pragma "no-cache"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/app1_error.log
    CustomLog ${APACHE_LOG_DIR}/app1_access.log combined
</VirtualHost>
